name: Run All Requests Scripts

on:
  push:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily (after SLURM runner is eligible at 02:55)
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Make launcher executable
        run: chmod +x scripts/download/launch_all_requests_scripts.sh
      - name: Run launcher with SLURM
        shell: bash -l {0}
        run: |
          mamba activate c3s-atlas
          bash scripts/download/launch_all_requests_scripts.sh
